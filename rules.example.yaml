# Правила переноса страниц. Скопируйте в rules.yaml и заполните под себя.
#
# Каждое правило — связка «откуда → куда по лейблам»:
#   sources — ID страниц-источников: берутся страницы из их поддеревьев (любая глубина).
#             Можно перечислить несколько; поддеревья объединяются.
#   labels  — лейблы, по которым отбираются страницы. Несколько = ИЛИ:
#             достаточно любого из них.
#   target  — ID страницы-назначения. Ровно одна: страница не может лежать
#             под несколькими родителями. Нужно несколько назначений —
#             заведите отдельные правила.
#   space   — (необязательно) ключ пространства для дополнительной фильтрации.
#             Если не указан, отбор ограничен только поддеревьями sources.
#   name    — (необязательно) имя правила для логов.
#
# ID страницы видно в её URL: .../pages/viewpage.action?pageId=123456
# либо через «…» → Page Information.

rules:
  - name: drafts-to-published
    sources:
      - "111111"
      - "222222"
    labels:
      - ready
      - approved
    target: "333333"
    space: DOCS

  - name: archive
    sources: "111111"
    labels: to-archive
    target: "444444"