# Правила переноса страниц. Скопируйте в rules.yaml и заполните под себя.
#
# Каждое правило — связка «откуда → куда по лейблам»:
#   source  — ID страницы-источника: берутся страницы из её поддерева (любая глубина).
#             Ровно один; в разных правилах не должен повторяться.
#   labels  — лейблы, по которым отбираются страницы. Несколько = ИЛИ:
#             достаточно любого из них.
#   target  — ID страницы-назначения. Ровно один: страница не может лежать
#             под несколькими родителями.
#   space   — (необязательно) ключ пространства для дополнительной фильтрации.
#             Если не указан, отбор ограничен только поддеревом source.
#   name    — (необязательно) имя правила для логов.
#
# ID страницы видно в её URL: .../pages/viewpage.action?pageId=123456
# либо через «…» → Page Information.

rules:
  - name: drafts-to-published
    source: "111111"
    labels:
      - ready
      - approved
    target: "333333"
    space: DOCS

  - name: archive
    source: "222222"
    labels: to-archive
    target: "444444"